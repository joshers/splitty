<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="apple-touch-icon" sizes="180x180" href="img/apple-touch-icon.png">
<link rel="icon" type="image/png" sizes="32x32" href="img/favicon-32x32.png">
<link rel="icon" type="image/png" sizes="16x16" href="img/favicon-16x16.png">
<link rel="manifest" href="img/site.webmanifest">
<title>Splitty 2.0</title>
<style>
  :root {
    --bg: #0f1115;
    --panel: #171a21;
    --border: #2a2e38;
    --text: #e8e9ed;
    --muted: #9aa0ac;
    --accent: #4f8cff;
    --accent-hover: #6ba0ff;
    --danger: #ff6b6b;
    --ok: #4caf7d;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    background: var(--bg);
    color: var(--text);
    padding: 2rem 1rem 4rem;
  }
  .wrap {
    max-width: 720px;
    margin: 0 auto;
  }
  h1 {
    font-size: 1.6rem;
    margin-bottom: 1.5rem;
  }
  .panel {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 1.25rem;
    margin-bottom: 1.25rem;
  }
  .panel h2 {
    font-size: 1.05rem;
    margin: 0 0 1rem;
  }
  .field-group {
    margin-bottom: 1.5rem;
  }
  .field-group:last-child {
    margin-bottom: 0;
  }
  .field-group label {
    display: block;
    font-size: 1.05rem;
    font-weight: 700;
    color: var(--text);
    margin-bottom: 0.6rem;
  }
  .input-with-icon {
    display: flex;
    align-items: stretch;
    border: 1px solid var(--border);
    border-radius: 8px;
    overflow: hidden;
    background: #0d0f14;
  }
  .input-with-icon:focus-within {
    border-color: var(--accent);
  }
  .input-icon {
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 0 1.1rem;
    color: var(--muted);
    font-size: 1.15rem;
    background: rgba(255, 255, 255, 0.03);
    border-right: 1px solid var(--border);
  }
  .input-with-icon input {
    border: none;
    border-radius: 0;
    background: transparent;
  }
  label {
    font-size: 0.9rem;
    color: var(--muted);
  }
  input[type="text"], input[type="number"] {
    width: 100%;
    background: #0d0f14;
    border: 1px solid var(--border);
    color: var(--text);
    padding: 0.75rem 1rem;
    border-radius: 6px;
    font-size: 1.05rem;
  }
  input:focus {
    outline: none;
    border-color: var(--accent);
  }
  .person-row {
    display: grid;
    grid-template-columns: 1fr 140px 32px;
    gap: 0.75rem;
    margin-bottom: 0.6rem;
    align-items: center;
  }
  .remove-btn {
    background: none;
    border: 1px solid var(--border);
    color: var(--danger);
    border-radius: 6px;
    width: 32px;
    height: 32px;
    cursor: pointer;
    font-size: 1rem;
    line-height: 1;
  }
  .remove-btn:hover { border-color: var(--danger); }
  .add-btn {
    background: none;
    border: 1px dashed var(--border);
    color: var(--accent);
    border-radius: 6px;
    padding: 0.45rem 0.9rem;
    cursor: pointer;
    font-size: 0.9rem;
    margin-top: 0.25rem;
  }
  .add-btn:hover { border-color: var(--accent); }
  .calc-btn {
    background: var(--accent);
    color: white;
    border: none;
    border-radius: 8px;
    padding: 0.75rem 1.25rem;
    font-size: 1rem;
    font-weight: 600;
    cursor: pointer;
    width: 100%;
  }
  .calc-btn:hover { background: var(--accent-hover); }
  .summary-line {
    display: flex;
    justify-content: space-between;
    font-size: 0.9rem;
    color: var(--muted);
    margin-bottom: 0.3rem;
  }
  .summary-line.mismatch { color: var(--danger); }
  table {
    width: 100%;
    border-collapse: collapse;
    margin-top: 0.5rem;
  }
  th, td {
    text-align: left;
    padding: 0.55rem 0.4rem;
    border-bottom: 1px solid var(--border);
    font-size: 0.92rem;
  }
  th { color: var(--muted); font-weight: 600; }
  td.num, th.num { text-align: right; }
  tfoot td {
    font-weight: 700;
    border-bottom: none;
    border-top: 2px solid var(--border);
  }
  .hint {
    font-size: 0.8rem;
    color: var(--muted);
    margin-top: 0.9rem;
    margin-bottom: 0.75rem;
  }
  #error-box {
    display: none;
    background: rgba(255, 107, 107, 0.1);
    border: 1px solid var(--danger);
    color: var(--danger);
    padding: 0.75rem 1rem;
    border-radius: 8px;
    margin-bottom: 1rem;
    font-size: 0.9rem;
  }
</style>
</head>
<body>
<div class="wrap">
  <h1>Splitty 2.0</h1>

  <div class="panel">
    <h2>Bill Details</h2>
    <div class="field-group">
      <label for="fees">Fees</label>
      <div class="input-with-icon">
        <span class="input-icon">$</span>
        <input type="number" id="fees" min="0" step="0.01" placeholder="0.00">
      </div>
    </div>
    <div class="field-group">
      <label for="tax">Tax</label>
      <div class="input-with-icon">
        <span class="input-icon">$</span>
        <input type="number" id="tax" min="0" step="0.01" placeholder="0.00">
      </div>
    </div>
    <div class="field-group">
      <label for="tip">Tip</label>
      <div class="input-with-icon">
        <span class="input-icon">$</span>
        <input type="number" id="tip" min="0" step="0.01" placeholder="0.00">
      </div>
    </div>
  </div>

  <div class="panel">
    <h2>People &amp; Their Food Cost</h2>
    <div id="people-list"></div>
    <button class="add-btn" id="add-person">+ Add person</button>
    <p class="hint" id="subtotal-hint"></p>
  </div>

  <div id="error-box"></div>

  <button class="calc-btn" id="calculate">Calculate Split</button>

  <div class="panel" id="results-panel" style="display:none; margin-top: 1.25rem;">
    <h2>Results</h2>
    <div class="summary-line"><span>Food subtotal</span><span id="sum-subtotal"></span></div>
    <div class="summary-line"><span>Tax + Fees + Tip</span><span id="sum-extra"></span></div>
    <div class="summary-line"><span>Grand total</span><span id="sum-total"></span></div>
    <table>
      <thead>
        <tr>
          <th>Person</th>
          <th class="num">Food</th>
          <th class="num">Share of tax/fees/tip</th>
          <th class="num">Owes</th>
        </tr>
      </thead>
      <tbody id="results-body"></tbody>
    </table>
  </div>
</div>

<script>
  const peopleList = document.getElementById('people-list');
  const subtotalHint = document.getElementById('subtotal-hint');
  let personCount = 0;

  function addPerson(name = '', amount = '') {
    personCount++;
    const isFirst = peopleList.children.length === 0;
    const row = document.createElement('div');
    row.className = 'person-row';
    row.innerHTML = `
      <input type="text" class="person-name" placeholder="Name ${personCount}" value="${name}">
      <input type="number" class="person-amount" min="0" step="0.01" placeholder="0.00" value="${amount}">
      ${isFirst ? '' : '<button class="remove-btn" title="Remove">&times;</button>'}
    `;
    const removeBtn = row.querySelector('.remove-btn');
    if (removeBtn) {
      removeBtn.addEventListener('click', () => {
        row.remove();
        updateSubtotalHint();
      });
    }
    row.querySelectorAll('input').forEach(inp => inp.addEventListener('input', updateSubtotalHint));
    peopleList.appendChild(row);
    updateSubtotalHint();
  }

  function getPeople() {
    return Array.from(peopleList.querySelectorAll('.person-row')).map(row => {
      const name = row.querySelector('.person-name').value.trim();
      const amount = parseFloat(row.querySelector('.person-amount').value);
      return { name, amount: isNaN(amount) ? 0 : amount };
    });
  }

  function updateSubtotalHint() {
    const people = getPeople();
    const total = people.reduce((sum, p) => sum + p.amount, 0);
    subtotalHint.textContent = `Food subtotal (sum of everyone's food): $${total.toFixed(2)}`;
  }

  document.getElementById('add-person').addEventListener('click', () => addPerson());

  // Start with two people by default
  addPerson();
  addPerson();

  function showError(msg) {
    const box = document.getElementById('error-box');
    box.textContent = msg;
    box.style.display = msg ? 'block' : 'none';
  }

  document.getElementById('calculate').addEventListener('click', () => {
    showError('');
    document.getElementById('results-panel').style.display = 'none';

    const tax = parseFloat(document.getElementById('tax').value) || 0;
    const fees = parseFloat(document.getElementById('fees').value) || 0;
    const tip = parseFloat(document.getElementById('tip').value) || 0;
    const extra = tax + fees + tip;

    const people = getPeople().filter(p => p.name || p.amount > 0);

    if (people.length === 0) {
      showError('Add at least one person with a name and a food amount.');
      return;
    }
    if (people.some(p => !p.name)) {
      showError('Every person needs a name.');
      return;
    }
    if (people.some(p => p.amount < 0)) {
      showError('Food amounts cannot be negative.');
      return;
    }

    const subtotal = people.reduce((sum, p) => sum + p.amount, 0);

    if (subtotal <= 0) {
      showError('Total food cost must be greater than $0 to split tax/fees/tip proportionally.');
      return;
    }

    const rows = people.map(p => {
      const ratio = p.amount / subtotal;
      const share = extra * ratio;
      const owes = p.amount + share;
      return { ...p, share, owes };
    });

    const tbody = document.getElementById('results-body');
    tbody.innerHTML = '';
    rows.forEach(r => {
      const tr = document.createElement('tr');
      tr.innerHTML = `
        <td>${escapeHtml(r.name)}</td>
        <td class="num">$${r.amount.toFixed(2)}</td>
        <td class="num">$${r.share.toFixed(2)}</td>
        <td class="num">$${r.owes.toFixed(2)}</td>
      `;
      tbody.appendChild(tr);
    });

    document.getElementById('sum-subtotal').textContent = `$${subtotal.toFixed(2)}`;
    document.getElementById('sum-extra').textContent = `$${extra.toFixed(2)}`;
    document.getElementById('sum-total').textContent = `$${(subtotal + extra).toFixed(2)}`;

    document.getElementById('results-panel').style.display = 'block';
  });

  function escapeHtml(str) {
    const div = document.createElement('div');
    div.textContent = str;
    return div.innerHTML;
  }
</script>
</body>
</html>
